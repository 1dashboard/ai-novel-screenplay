screenplay:
  meta:
    title: "春日尽"
    original_work: "春日尽"
    original_author: "（原著作者）"
    adapted_by: "AI Novel-to-Script v0.1.0"
    version: "0.1.0"
    created_at: "2026-06-05T14:30:00Z"
    language: "zh-CN"
    total_acts: 3
    total_scenes: 6
    source_file: "examples/sample_novel.txt"
    notes:
      - "第3章林晓与陈序重逢段落中，内心活动丰富，部分情感层次由AI推断"
  characters:
    - id: "char_001"
      name: "林晓"
      aliases: ["晓晓", "林小姐"]
      role: "protagonist"
      gender: "female"
      age_range: "25-30"
      traits:
        - "执着"
        - "内向敏感"
        - "音乐天赋"
      description: "25岁小提琴手/钢琴手，独自在城市生活，父母离异。为考星海音乐学院研究生而努力。"
      relationships:
        - character_id: "char_002"
          relation: "前男友"
          description: "大学时相识，因异地分手。七年后在音乐学院重逢。"
        - character_id: "char_004"
          relation: "母亲"
          description: "传统、严厉，表达爱意的方式笨拙但真实。"
      first_appearance_scene: 1
    - id: "char_002"
      name: "陈序"
      aliases: ["陈先生"]
      role: "protagonist"
      gender: "male"
      age_range: "25-30"
      traits:
        - "理性"
        - "念旧"
      description: "盛华文化集团副总裁助理，负责青年音乐家扶持计划。七年前与林晓分手。"
      relationships:
        - character_id: "char_001"
          relation: "前女友"
          description: "大学恋人，异地后分手。在星海音乐学院重逢。"
      first_appearance_scene: 4
    - id: "char_003"
      name: "赵如兰"
      aliases: []
      role: "supporting"
      gender: "female"
      age_range: "60以上"
      traits:
        - "严苛"
        - "慧眼识才"
      description: "著名钢琴教育家，星海音乐学院复试评委。对林晓的才华印象深刻。"
      first_appearance_scene: 6
    - id: "char_004"
      name: "林母"
      aliases: []
      role: "supporting"
      gender: "female"
      age_range: "50-55"
      traits:
        - "传统"
        - "严厉"
        - "不善表达"
      description: "认为女孩子学音乐是为了嫁得好，但内心关心女儿。"
      first_appearance_scene: 1
    - id: "char_005"
      name: "王主任"
      aliases: []
      role: "minor"
      gender: "male"
      age_range: "40-50"
      traits:
        - "行政化"
      description: "星海音乐学院教务处主任，负责接待陈序。"
      first_appearance_scene: 4
  acts:
    - act_number: 1
      title: "第一幕：开端"
      scenes:
        - scene_number: 1
          scene_heading: "INT. 林晓的公寓 - 日"
          location: "林晓的公寓"
          time_of_day: "日"
          characters_present:
            - "char_001"
          summary: "林晓在公寓中接到复试通知，决定重新开始练琴。"
          content:
            - type: "action"
              text: "林晓站在公寓窗前，手指无意识地敲着窗台。旧窗框抖落细碎的木屑，落在她赤裸的脚背上。窗外是灰蒙蒙的城市天空，对面楼顶的鸽子踱着方步。"
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "我会去的。"
              delivery: "平静"
            - type: "action"
              text: "挂掉电话后，她发现自己的手在发抖。"
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "第X号选手，请入场。"
              delivery: "对着镜子自言自语"
            - type: "action"
              text: "她走到钢琴前，掀开琴盖。手指落下，是肖邦的《冬风练习曲》。窗外的鸽子被琴声惊起，扑棱棱飞向铅灰色的天空。"
            - type: "note"
              text: "原著此处有林晓对过去的回忆（三个月前琴行工作、母亲的话），部分为心理描写。已在 action 中融合，建议导演考虑是否用闪回呈现。"
              severity: "suggestion"
        - scene_number: 2
          scene_heading: "EXT. 星海音乐学院大楼前 - 日"
          location: "星海音乐学院大楼前"
          time_of_day: "日"
          characters_present:
            - "char_002"
            - "char_005"
          summary: "陈序来到星海音乐学院谈合作，在走廊听到熟悉的钢琴声。"
          content:
            - type: "action"
              text: "陈序站在星海音乐学院大楼前，仰头看着'音乐厅'铜牌。"
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "你学金融，我学音乐。我们都可以找到自己的路。"
              delivery: "回忆中的声音"
            - type: "action"
              text: "远处传来一阵钢琴声——肖邦的《冬风》。陈序愣住了。"
            - type: "dialogue"
              character_id: "char_005"
              character_name: "王主任"
              text: "那是我们的考生在练琴。今年有个选手特别厉害，据说初试时把评委都震住了。"
              delivery: ""
            - type: "note"
              text: "此段陈序的回忆（七年前与林晓的夏天）在小说中是心理描写。建议用短暂的闪回影像辅助。"
              severity: "suggestion"
    - act_number: 2
      title: "第二幕：发展"
      scenes:
        - scene_number: 3
          scene_heading: "INT. 星海音乐学院后台候场区 - 日"
          location: "星海音乐学院后台候场区"
          time_of_day: "日"
          characters_present:
            - "char_001"
          summary: "林晓等待复试，穿着母亲寄来的裙子，感受到母亲笨拙的爱。"
          content:
            - type: "action"
              text: "林晓坐在后台候场区，看着前面的人越来越少。她穿着深蓝色的连衣裙。"
            - type: "dialogue"
              character_id: "char_004"
              character_name: "林母"
              text: "好好考，别丢人。"
              delivery: "纸条上的文字（VO）"
            - type: "action"
              text: "这是母亲表达关心的方式，笨拙但真实。"
        - scene_number: 4
          scene_heading: "INT. 音乐厅考场 - 日"
          location: "星海音乐学院音乐厅"
          time_of_day: "日"
          characters_present:
            - "char_001"
            - "char_003"
          summary: "林晓演奏莫扎特和肖邦，技惊四座，赵如兰起立鼓掌。"
          content:
            - type: "action"
              text: "聚光灯亮得刺眼。评委席上坐了五个人，正中间的赵如兰头发花白。"
            - type: "dialogue"
              character_id: "char_003"
              character_name: "赵如兰"
              text: "请开始。"
              delivery: ""
            - type: "action"
              text: "林晓在琴凳上坐下，闭上眼睛。第一乐章莫扎特《C大调奏鸣曲》，手指在琴键上流动。第二乐章肖邦《冬风》，弹到华彩部分时，感到一种从未有过的自由。"
            - type: "action"
              text: "最后一个和弦落下，音乐厅里安静了几秒。赵如兰开始鼓掌，站起身。"
            - type: "dialogue"
              character_id: "char_003"
              character_name: "赵如兰"
              text: "姑娘，你老师是谁？"
              delivery: "热切"
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "我——我是自学的，除了小时候跟镇上的音乐老师学了两年。"
              delivery: "犹豫"
            - type: "action"
              text: "评委席上响起一阵低语。"
        - scene_number: 5
          scene_heading: "INT. 后台走廊 - 日"
          location: "星海音乐学院后台走廊"
          time_of_day: "日"
          characters_present:
            - "char_001"
            - "char_002"
          summary: "林晓与陈序在走廊重逢，七年后第一次面对面。"
          content:
            - type: "action"
              text: "林晓推开后台的门，差点撞上一个人。两人在狭窄的走廊里面对面站着，相隔不到一米。陈序拿着文件，差点掉在地上。"
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "林晓？"
              delivery: "惊讶"
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "......陈序？"
              delivery: "迟疑"
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "你在这做什么？"
              delivery: ""
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "出差。"
              delivery: ""
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "你呢？"
              delivery: ""
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "复试——星海的研究生。我以为你在上海。"
              delivery: "解释"
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "调回来了。去年的事。你弹得很好。我在走廊里听到了一点。"
              delivery: ""
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "谢谢。"
              delivery: "轻声"
            - type: "action"
              text: "陈序要走，又停下。"
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "林晓。"
              delivery: ""
            - type: "dialogue"
              character_id: "char_001"
              character_name: "林晓"
              text: "嗯？"
              delivery: ""
            - type: "dialogue"
              character_id: "char_002"
              character_name: "陈序"
              text: "你真的弹得很好。不是恭维。"
              delivery: ""
            - type: "action"
              text: "她站在原地，看着他的背影消失在走廊拐角。后台空调嗡嗡响，像某种巨大的、压抑的心跳。"
            - type: "action"
              text: "林晓低下头，发现自己又在发抖。和早上接电话时不一样，这次不是因为紧张。"
            - type: "note"
              text: "重逢场景中，林晓的内心活动非常丰富（想说又没说出口的话）。建议导演和演员重点打磨这一场的情感层次。"
              severity: "suggestion"
    - act_number: 3
      title: "第三幕：结局"
      scenes:
        - scene_number: 6
          scene_heading: "INT. 林晓的公寓 - 夜"
          location: "林晓的公寓"
          time_of_day: "夜"
          characters_present:
            - "char_001"
          summary: "（待补充：复试结果与最终选择）"
          content:
            - type: "note"
              text: "原著仅有三章，第三幕为AI根据剧情走向建议的延续场景。作者可根据需要扩展或修改。"
              severity: "info"
